# HETU SafePlay - Render.com Blueprint
# Deploy: New > Blueprint > Connect repository

databases:
  - name: hetu-db
    plan: free
    databaseName: hetu_safeplay

services:
  - type: web
    name: hetu-safeplay
    runtime: python
    plan: free

    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --forwarded-allow-ips="*"

    envVars:
      - key: ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: hetu-db
          property: connectionString
      # Generate with: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
      - key: SALAUSAVAIN
        sync: false
